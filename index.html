<!DOCTYPE html>
<html lang="th">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>One Piece Character Bingo</title>

    <link rel="stylesheet" href="css/style.css">

</head>


<body>


<header>

    <h1>🏴‍☠️ ONE PIECE CHARACTER BINGO</h1>

</header>



<main>


    <div class="buttons">

        <button id="randomBoard">
            🎲 Random Board
        </button>


        <button id="drawCharacter">
            🎰 Draw Character
        </button>


        <button id="createBoard">
            ✏️ Create My Board
        </button>


        <button id="downloadBoard">
            📷 Download PNG
        </button>

    </div>




    <div id="drawResult">

        <h2>Draw Result</h2>

        <p id="drawName">
            Press "Draw Character"
        </p>

    </div>





    <div id="customArea"></div>





    <div id="bingoBoard"></div>





    <div id="bingoMessage"></div>




</main>




<script src="js/script.js"></script>


</body>


</html>

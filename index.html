<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>One Piece Character Bingo</title>

    <link rel="stylesheet" href="css/style.css">

</head>


<body>


<h1>🏴‍☠️ ONE PIECE CHARACTER BINGO</h1>


<div id="bingo-message"></div>


<div id="bingo-board"></div>


<<div class="controls">

    <button id="new-board">
        🎲 Random Board
    </button>

    <button id="custom-mode">
        ✏️ Create My Board
    </button>

    <button id="caller">
        🎰 Draw Character
    </button>

    <button id="download">
        📷 Download PNG
    </button>

</div>


<div id="custom-panel" style="display:none;">

    <h2>Create Your Bingo</h2>

    <div id="custom-inputs"></div>

    <button id="create-custom">
        ✅ Create Bingo
    </button>

</div>



<div id="caller-box">

    <h2>Draw Result</h2>

    <p id="caller-result">
        Press "Draw Character"
    </p>

</div>



<script src="js/script.js"></script>


</body>

</html>
